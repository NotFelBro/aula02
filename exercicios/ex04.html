<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Cadastro de Alunos</h1>

    <p>
      Este é um <b>exercicio prático</b> para treinar HTML.<br />Aqui você vai
      usar títulos, parágrafos, listas e tabelas.
    </p>

    <h2>Lista de Matérias</h2>

    <ul type="square">
      <li>Matemática</li>
      <li>Português</li>
      <li>Ciências</li>
    </ul>

    <h2>Tabela de Alunos</h2>

    <table border="1">
      <tr>
        <th>Nome</th>
        <th>Idade</th>
        <th>Tefelone</th>
      </tr>
      <tr>
        <td>Ana</td>
        <td>20</td>
        <td>(11)99999-1111</td>
      </tr>
      <tr>
        <td>Carlos</td>
        <td>22</td>
        <td>(11)98888-1111</td>
      </tr>
    </table>
  </body>
</html>
